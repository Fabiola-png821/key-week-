<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🌸 ESCUELA AMIGA - Abecedario y Números hasta 25 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: #FFF9F0;
            border-radius: 80px 80px 40px 40px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.3), 0 0 0 10px #FFD700;
            overflow: hidden;
        }

        /* ========== HEADER CON RACHA ========== */
        .header {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            padding: 20px;
            border-bottom: 8px solid #FFD700;
        }

        .header-superior {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 60px;
        }

        .logo-escuela {
            font-size: 50px;
            background: white;
            padding: 10px 20px;
            border-radius: 40px;
            box-shadow: 0 5px 0 #FF1493;
        }

        .racha-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #FFD700;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 40px;
            box-shadow: 0 5px 0 #B8860B;
        }

        .contador-dias {
            font-size: 30px;
            font-weight: bold;
            color: #FF1493;
        }

        .estrellas-puntos {
            background: #FF1493;
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 35px;
            color: white;
            box-shadow: 0 5px 0 #8B0A50;
        }

        /* Barra de progreso */
        .progreso-diario {
            margin-top: 15px;
            background: white;
            border-radius: 60px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 4px solid #FFD700;
        }

        .icono-progreso {
            font-size: 40px;
            background: #FF8E53;
            width: 70px;
            height: 70px;
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .barra-container {
            flex: 1;
            height: 25px;
            background: #F0F0F0;
            border-radius: 30px;
            overflow: hidden;
            border: 3px solid #FF6B6B;
        }

        .barra-llenado {
            height: 100%;
            background: linear-gradient(90deg, #FF6B6B, #FFD700);
            border-radius: 30px;
            transition: width 0.5s ease;
        }

        /* ========== TABS DE NAVEGACIÓN ========== */
        .tabs-container {
            display: flex;
            background: #FFD700;
            padding: 10px;
            gap: 5px;
            border-bottom: 5px solid #FF6B6B;
            flex-wrap: wrap;
        }

        .tab-btn {
            flex: 1;
            min-width: 80px;
            background: white;
            border: none;
            padding: 15px 5px;
            border-radius: 40px;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #FF6B6B;
            box-shadow: 0 5px 0 #FFB6C1;
            transition: all 0.2s;
        }

        .tab-btn.activo {
            background: #FF6B6B;
            color: white;
            box-shadow: 0 5px 0 #8B0A50;
            transform: scale(1.05);
        }

        .tab-btn span {
            font-size: 16px;
            font-weight: bold;
        }

        /* ========== CONTENIDO DE LAS TABS ========== */
        .contenido-tab {
            padding: 15px;
            max-height: 60vh;
            overflow-y: auto;
        }

        /* ========== CLASES TEORÍA ========== */
        .clase-teoria {
            background: white;
            border-radius: 60px;
            padding: 25px;
            margin-bottom: 20px;
            border: 5px solid #FFD700;
            box-shadow: 0 10px 0 #FF8E53;
        }

        .selector-clase {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            background: #FFEAA7;
            padding: 15px;
            border-radius: 50px;
        }

        .btn-cambiar-clase {
            background: #FF6B6B;
            border: none;
            color: white;
            font-size: 40px;
            width: 70px;
            height: 70px;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 5px 0 #8B0A50;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-cambiar-clase:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #8B0A50;
        }

        .indicador-clase {
            font-size: 30px;
            font-weight: bold;
            color: #FF1493;
            background: white;
            padding: 10px 25px;
            border-radius: 40px;
            border: 3px solid #FFD700;
        }

        .titulo-clase {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 40px;
            color: #FF1493;
            margin-bottom: 20px;
        }

        .explicacion-profesora {
            background: #F0F8FF;
            border-radius: 50px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            border: 4px dashed #FF6B6B;
        }

        .avatar-profe {
            font-size: 70px;
            background: #FFD700;
            width: 100px;
            height: 100px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .burbuja-profe {
            flex: 1;
            font-size: 28px;
            color: #333;
        }

        .ejemplo-visual {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
            padding: 20px;
            background: #FFEAA7;
            border-radius: 50px;
            flex-wrap: wrap;
        }

        .letra-ejemplo {
            font-size: 100px;
            font-weight: bold;
            color: #FF1493;
            text-shadow: 3px 3px 0 #FFD700;
        }

        .dibujo-ejemplo {
            font-size: 100px;
        }

        .palabra-ejemplo {
            font-size: 40px;
            color: #4ECDC4;
            font-weight: bold;
        }

        /* CONTEO VISUAL - AHORA CON TODOS LOS DIBUJOS */
        .conteo-visual {
            background: #FFEAA7;
            border-radius: 50px;
            padding: 25px;
            margin: 20px 0;
            text-align: center;
            border: 5px solid #FFD700;
        }

        .conteo-dibujos-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 20px 0;
            font-size: 40px;
            line-height: 1.4;
        }

        .conteo-dibujos-grid span {
            display: inline-block;
            animation: aparecer 0.3s ease;
        }

        .numero-ejemplo {
            font-size: 80px;
            font-weight: bold;
            color: #FF1493;
            text-shadow: 3px 3px 0 #FFD700;
            margin-top: 15px;
        }

        .boton-escuchar-clase {
            background: #4ECDC4;
            border: none;
            color: white;
            font-size: 40px;
            padding: 20px;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 10px 0 #2C9B8F;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .boton-escuchar-clase:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #2C9B8F;
        }

        /* ========== PRACTICAR LETRAS ========== */
        .tarjeta-practica {
            background: linear-gradient(145deg, #FFB6C1, #FFC0CB);
            padding: 25px;
            border-radius: 70px;
            border: 8px solid white;
            box-shadow: 0 15px 0 #FF69B4;
            text-align: center;
            margin-bottom: 20px;
        }

        .pregunta-practica {
            font-size: 40px;
            color: #FF1493;
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 50px;
            border: 4px solid #FFD700;
        }

        .letra-practica {
            font-size: 150px;
            font-weight: bold;
            color: #FF1493;
            text-shadow: 5px 5px 0 #FFD700;
        }

        .dibujo-practica {
            font-size: 100px;
            margin: 15px 0;
        }

        .opciones-practica {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .opcion-practica {
            background: white;
            border: 5px solid #FFD700;
            border-radius: 40px;
            padding: 20px;
            cursor: pointer;
            box-shadow: 0 10px 0 #FF69B4;
            transition: all 0.1s;
        }

        .opcion-practica:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #FF69B4;
        }

        .opcion-practica.correcta {
            background: #90EE90;
            border-color: #32CD32;
            box-shadow: 0 10px 0 #228B22;
        }

        .opcion-practica.incorrecta {
            background: #FFB6C1;
            border-color: #FF69B4;
            box-shadow: 0 10px 0 #FF1493;
        }

        .letra-opcion {
            font-size: 60px;
            font-weight: bold;
            color: #FF1493;
        }

        .dibujo-opcion {
            font-size: 50px;
        }

        /* ========== LEER PALABRAS ========== */
        .juego-leer {
            background: white;
            border-radius: 60px;
            padding: 25px;
            border: 5px solid #4ECDC4;
            box-shadow: 0 10px 0 #2C9B8F;
            margin-bottom: 20px;
        }

        .instruccion-leer {
            font-size: 35px;
            color: #2C9B8F;
            margin-bottom: 20px;
            text-align: center;
        }

        .palabra-para-leer {
            background: #FFEAA7;
            padding: 30px;
            border-radius: 50px;
            text-align: center;
            margin-bottom: 25px;
            border: 5px dashed #FF6B6B;
        }

        .letras-palabra {
            font-size: 70px;
            font-weight: bold;
            color: #FF1493;
            letter-spacing: 15px;
        }

        .dibujo-palabra {
            font-size: 80px;
            margin: 15px 0;
        }

        .opciones-palabras {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .opcion-palabra {
            background: #4ECDC4;
            border: none;
            padding: 25px;
            border-radius: 40px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 0 #2C9B8F;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .opcion-palabra:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #2C9B8F;
        }

        .opcion-palabra.correcta {
            background: #90EE90;
            color: #228B22;
            box-shadow: 0 8px 0 #228B22;
        }

        /* ========== SECCIÓN NÚMEROS - CORREGIDA ========== */
        .tarjeta-numeros {
            background: linear-gradient(145deg, #FFD700, #FFA500);
            padding: 25px;
            border-radius: 70px;
            border: 8px solid white;
            box-shadow: 0 15px 0 #FF8C00;
            text-align: center;
            margin-bottom: 20px;
        }

        .conteo-dibujos-completo {
            background: white;
            border-radius: 50px;
            padding: 25px;
            margin: 20px 0;
            border: 5px solid #FF1493;
            max-height: 300px;
            overflow-y: auto;
        }

        .grid-dibujos {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            font-size: 45px;
            line-height: 1.6;
        }

        .grid-dibujos span {
            display: inline-block;
            animation: aparecer 0.3s ease;
        }

        .numero-visible {
            font-size: 70px;
            font-weight: bold;
            color: #FF1493;
            margin: 15px 0;
        }

        .opciones-numeros {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .opcion-numero {
            background: white;
            border: 5px solid #FF1493;
            border-radius: 40px;
            padding: 25px;
            cursor: pointer;
            box-shadow: 0 10px 0 #8B0A50;
            transition: all 0.1s;
            font-size: 60px;
            font-weight: bold;
            color: #FF1493;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .opcion-numero:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #8B0A50;
        }

        .opcion-numero.correcta {
            background: #90EE90;
            border-color: #32CD32;
            color: #228B22;
            box-shadow: 0 10px 0 #228B22;
        }

        .opcion-numero.incorrecta {
            background: #FFB6C1;
            border-color: #FF69B4;
            color: #FF1493;
            box-shadow: 0 10px 0 #FF1493;
        }

        .vista-previa {
            font-size: 30px;
            opacity: 0.7;
        }

        /* ========== LOGROS ========== */
        .logros-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .logro-card {
            background: white;
            border-radius: 40px;
            padding: 25px;
            text-align: center;
            border: 5px solid #FFD700;
            opacity: 0.5;
            filter: grayscale(1);
        }

        .logro-card.desbloqueado {
            opacity: 1;
            filter: none;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-color: #FF1493;
        }

        .logro-icono {
            font-size: 70px;
            margin-bottom: 10px;
        }

        .logro-nombre {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .racha-info {
            background: #FF6B6B;
            padding: 30px;
            border-radius: 50px;
            text-align: center;
            color: white;
        }

        .racha-numero {
            font-size: 80px;
            font-weight: bold;
        }

        /* ========== FOOTER ========== */
        .frase-motivacional {
            text-align: center;
            padding: 20px;
            background: #FF1493;
            color: white;
            font-size: 35px;
            border-top: 5px solid #FFD700;
        }

        .oculto {
            display: none;
        }

        .tipo-clase {
            background: #FF1493;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 24px;
            display: inline-block;
            margin-bottom: 15px;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- HEADER CON RACHA -->
        <div class="header">
            <div class="header-superior">
                <span class="logo-escuela" data-tooltip="Escuela Amiga">🏫</span>
                
                <div class="racha-container" data-tooltip="Días seguidos">
                    <span>🔥</span>
                    <span class="contador-dias" id="rachaDias">0</span>
                </div>
                
                <span class="estrellas-puntos" data-tooltip="Tus puntos">
                    ⭐ <span id="puntajeTotal">0</span>
                </span>
            </div>

            <div class="progreso-diario">
                <span class="icono-progreso" data-tooltip="Progreso hoy">📅</span>
                <div class="barra-container">
                    <div class="barra-llenado" id="progresoGlobal" style="width: 0%"></div>
                </div>
                <span class="icono-progreso" id="porcentajeHoy">0%</span>
            </div>
        </div>

        <!-- TABS DE NAVEGACIÓN -->
        <div class="tabs-container">
            <button class="tab-btn activo" id="tabClases">
                <span>📚</span>
                <span>CLASES</span>
            </button>
            <button class="tab-btn" id="tabPracticar">
                <span>✏️</span>
                <span>PRACTICAR</span>
            </button>
            <button class="tab-btn" id="tabLeer">
                <span>📖</span>
                <span>LEER</span>
            </button>
            <button class="tab-btn" id="tabNumeros">
                <span>🔢</span>
                <span>NÚMEROS</span>
            </button>
            <button class="tab-btn" id="TabLogros">
                <span>🏆</span>
                <span>LOGROS</span>
            </button>
        </div>

        <!-- CONTENIDO DE LAS TABS -->
        <div class="contenido-tab" id="contenidoTabs">
            <!-- TAB 1: CLASES -->
            <div id="tabClasesContent">
                <div class="clase-teoria" id="claseActual">
                    <div class="selector-clase">
                        <button class="btn-cambiar-clase" id="btnClaseAnterior">◀</button>
                        <span class="indicador-clase" id="indicadorClase">1/52</span>
                        <button class="btn-cambiar-clase" id="btnClaseSiguiente">▶</button>
                    </div>

                    <div class="tipo-clase" id="tipoClase">LETRA</div>
                    
                    <div class="explicacion-profesora">
                        <div class="avatar-profe">👩‍🏫</div>
                        <div class="burbuja-profe" id="explicacionProfe">
                            Hoy vamos a aprender la letra A
                        </div>
                    </div>

                    <div class="ejemplo-visual" id="ejemploVisual">
                        <span class="letra-ejemplo" id="letraTeoria">A</span>
                        <span class="dibujo-ejemplo" id="dibujoTeoria">🐝</span>
                        <span class="palabra-ejemplo" id="palabraTeoria">ABEJA</span>
                    </div>

                    <div class="conteo-visual oculto" id="conteoVisual">
                        <div class="conteo-dibujos-grid" id="dibujosConteo"></div>
                        <div class="numero-ejemplo" id="numeroTeoria"></div>
                    </div>

                    <button class="boton-escuchar-clase" id="btnEscucharClase">
                        <span>🔊</span> ESCUCHAR CLASE
                    </button>
                </div>
            </div>

            <!-- TAB 2: PRACTICAR LETRAS -->
            <div id="tabPracticarContent" style="display: none;">
                <div class="tarjeta-practica">
                    <div class="pregunta-practica">¿QUÉ LETRA ES?</div>
                    
                    <div class="letra-practica" id="letraPregunta">?</div>
                    <div class="dibujo-practica" id="dibujoPregunta">🐝</div>

                    <div class="opciones-practica" id="opcionesPractica"></div>
                </div>
            </div>

            <!-- TAB 3: LEER PALABRAS -->
            <div id="tabLeerContent" style="display: none;">
                <div class="juego-leer">
                    <div class="instruccion-leer">🔤 FORMA LA PALABRA</div>
                    
                    <div class="palabra-para-leer">
                        <div class="letras-palabra" id="palabraObjetivo">A E</div>
                        <div class="dibujo-palabra" id="dibujoPalabra">🐝🐘</div>
                    </div>

                    <div class="opciones-palabras" id="opcionesPalabras"></div>
                </div>
            </div>

            <!-- TAB 4: NÚMEROS - CORREGIDO -->
            <div id="tabNumerosContent" style="display: none;">
                <div class="tarjeta-numeros">
                    <div class="pregunta-practica">🔢 ¿CUÁNTOS HAY?</div>
                    
                    <div class="conteo-dibujos-completo" id="conteoDibujosCompleto">
                        <div class="grid-dibujos" id="gridDibujos"></div>
                    </div>

                    <div class="opciones-numeros" id="opcionesNumeros"></div>
                </div>
            </div>

            <!-- TAB 5: LOGROS -->
            <div id="tabLogrosContent" style="display: none;">
                <div class="logros-grid" id="logrosGrid"></div>

                <div class="racha-info">
                    <div>🔥 RACHA ACTUAL</div>
                    <div class="racha-numero" id="rachaNumero">0</div>
                    <div>días seguidos</div>
                    <button class="boton-escuchar-clase" id="btnRegistroDiario" style="margin-top: 20px; font-size: 30px;">
                        📅 REGISTRAR DÍA
                    </button>
                </div>
            </div>
        </div>

        <!-- FRASE MOTIVACIONAL -->
        <div class="frase-motivacional" id="fraseMotivadora">
            🌸 ¡TÚ PUEDES, HERMOSA! 🌸
        </div>
    </div>

    <script>
        (function() {
            // ========== ABECEDARIO COMPLETO (27 LETRAS) ==========
            const leccionesLectura = [
                // Vocales (5)
                { id: 1, tipo: 'letra', letra: 'A', palabra: 'ABEJA', dibujo: '🐝', 
                  explicacion: 'La A es la primera vocal. Mira la 🐝 ABEJA empieza con A' },
                { id: 2, tipo: 'letra', letra: 'E', palabra: 'ELEFANTE', dibujo: '🐘', 
                  explicacion: 'La E es la segunda vocal. El 🐘 ELEFANTE empieza con E' },
                { id: 3, tipo: 'letra', letra: 'I', palabra: 'IGLESIA', dibujo: '⛪', 
                  explicacion: 'La I es la tercera vocal. La ⛪ IGLESIA empieza con I' },
                { id: 4, tipo: 'letra', letra: 'O', palabra: 'OSO', dibujo: '🐻', 
                  explicacion: 'La O es la cuarta vocal. El 🐻 OSO empieza con O' },
                { id: 5, tipo: 'letra', letra: 'U', palabra: 'UVA', dibujo: '🍇', 
                  explicacion: 'La U es la quinta vocal. La 🍇 UVA empieza con U' },
                
                // Consonantes (22, incluyendo Ñ)
                { id: 6, tipo: 'letra', letra: 'B', palabra: 'BEBÉ', dibujo: '👶',
